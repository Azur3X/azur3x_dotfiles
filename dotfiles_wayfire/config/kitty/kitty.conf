# ── Kitty Config ──
# Theme: based on wallpaper (dark grey, blood red, silver, dark purple)

# Font
font_family JetBrainsMono Nerd Font Mono
font_size        10

# Cursor
cursor           #ffffff
cursor_text_color #0a0a0a
cursor_shape     block
cursor_blink_interval 0

# Window
background_opacity 0.9
window_padding_width 8

# Colors — volcano palette (matches wallhaven-k8kr2d.jpg + nvim theme)
background            #0d090e
foreground            #d0d0d0

selection_background  #8b0000
selection_foreground  #f0f0f0

# Black (UI shadows)
color0  #1a1015
color8  #2a1a28

# Red — vivid crimson (errors, warnings)
color1  #cc2200
color9  #e83a1a

# Green → amber (executables, success)
color2  #aa6622
color10 #ffaa44

# Yellow → orange-gold (ls specials, warnings)
color3  #aa5500
color11 #ff9933

# Blue → deep crimson (directories)
color4  #8b1a0a
color12 #cc2200

# Magenta → dark wine (symlinks dim)
color5  #772233
color13 #cc4455

# Cyan → ember ochre (symlinks, device files)
color6  #886644
color14 #c4845a

# White (text)
color7  #d0d0d0
color15 #f0f0f0

# Tab bar
tab_bar_style powerline
tab_powerline_style slanted
active_tab_background   #8b0000
active_tab_foreground   #ffffff
inactive_tab_background #1a1a1a
inactive_tab_foreground #666666

enabled_layouts splits
map ctrl+shift+e launch --location=vsplit
map ctrl+shift+o launch --location=hsplit
map ctrl+shift+w close_window
map ctrl+shift+h neighboring_window left
map ctrl+shift+l neighboring_window right
map ctrl+shift+k neighboring_window up
map ctrl+shift+j neighboring_window down

shell /usr/bin/fish
