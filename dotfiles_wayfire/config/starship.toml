add_newline = false

format = """
$cmd_duration$directory$git_branch
$character"""

[character]
success_symbol = "[❯](bold fg:blue)"
error_symbol = "[❯](bold fg:red)"

[package]
disabled = true

[directory]
home_symbol = "~"
read_only = " "
truncation_length = 4
truncation_symbol = "…/"
format = "[$path](fg:cyan)[$read_only](fg:red) "

[git_branch]
symbol = " "
truncation_length = 12
truncation_symbol = ""
format = "[$symbol$branch](fg:purple) "

[git_status]
format = '([$all_status$ahead_behind](fg:yellow) )'

[cmd_duration]
min_time = 500
format = "[$duration](fg:yellow) "

[username]
disabled = true

[hostname]
disabled = true
